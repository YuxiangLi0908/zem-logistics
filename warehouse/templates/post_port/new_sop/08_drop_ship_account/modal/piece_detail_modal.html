<!-- 件数详情弹框 -->
<div id="pieceDetailModal" class="piece-detail-modal">
    <div class="piece-detail-modal-content">
        <div class="piece-detail-modal-header">
            <h3><i class="fas fa-boxes"></i> 件数详情</h3>
            <button type="button" class="piece-detail-modal-close" onclick="closePieceDetailModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="piece-detail-modal-body">
            <div class="piece-detail-search-bar">
                <input type="text" id="pieceDetailSearch" class="piece-detail-search-input" placeholder="搜索唛头..." oninput="filterPieceDetail()">
                <i class="fas fa-search piece-detail-search-icon"></i>
            </div>
            <div class="piece-detail-table-wrapper">
                <table class="piece-detail-table">
                    <thead>
                        <tr>
                            <th style="width: 120px;">商品型号</th>
                            <th style="width: 150px;">唛头</th>
                            <th style="width: 90px;">出库件数</th>
                            <th style="width: 120px;">在库天数</th>
                            <th style="width: 90px;">在库月份</th>
                            <th style="width: 130px;">费用类型</th>
                        </tr>
                    </thead>
                    <tbody id="pieceDetailTableBody">
                    </tbody>
                </table>
            </div>
            <div class="piece-detail-footer">
                <span id="pieceDetailCount">共 0 条记录</span>
                <div class="piece-detail-modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closePieceDetailModal()">取消</button>
                    <button type="button" class="btn btn-primary" onclick="generateFeeItems()">生成费用</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .piece-detail-modal {
        display: none;
        position: fixed;
        z-index: 3000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(2px);
    }

    .piece-detail-modal-content {
        background: #fff;
        border-radius: 14px;
        width: 750px;
        max-height: 80vh;
        margin: auto;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        animation: pieceDetailModalIn 0.3s ease-out;
        display: flex;
        flex-direction: column;
    }

    @keyframes pieceDetailModalIn {
        from { transform: translate(-50%, calc(-50% - 30px)); opacity: 0; }
        to { transform: translate(-50%, -50%); opacity: 1; }
    }

    .piece-detail-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 24px;
        border-bottom: 1px solid #e0e0e0;
        background: linear-gradient(135deg, #4a6491, #2c3e50);
        color: #fff;
        border-radius: 14px 14px 0 0;
    }

    .piece-detail-modal-header h3 {
        margin: 0;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .piece-detail-modal-close {
        background: none;
        border: none;
        color: #fff;
        font-size: 1.2rem;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 4px;
        transition: background 0.2s;
    }

    .piece-detail-modal-close:hover {
        background: rgba(255, 255, 255, 0.2);
    }

    .piece-detail-modal-body {
        padding: 20px 24px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        flex: 1;
    }

    .piece-detail-search-bar {
        position: relative;
        margin-bottom: 16px;
    }

    .piece-detail-search-input {
        width: 100%;
        padding: 10px 14px 10px 38px;
        border: 1px solid #ced4da;
        border-radius: 8px;
        font-size: 0.9rem;
        box-sizing: border-box;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .piece-detail-search-input:focus {
        outline: none;
        border-color: #4a6491;
        box-shadow: 0 0 0 0.2rem rgba(74, 100, 145, 0.15);
    }

    .piece-detail-search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #999;
    }

    .piece-detail-table-wrapper {
        overflow-y: auto;
        max-height: 50vh;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
    }

    .piece-detail-table {
        width: 100%;
        border-collapse: collapse;
    }

    .piece-detail-table th {
        background: #4a6491;
        color: white;
        padding: 10px 14px;
        text-align: left;
        font-weight: 600;
        font-size: 0.85rem;
        border-bottom: 2px solid #2c3e50;
        position: sticky;
        top: 0;
        z-index: 1;
    }

    .piece-detail-table td {
        padding: 8px 14px;
        border-bottom: 1px solid #eaecef;
        font-size: 0.88rem;
        color: #333;
        text-align: center;
    }

    .piece-detail-table td:first-child {
        text-align: left;
    }

    .piece-detail-footer {
        margin-top: 12px;
        font-size: 0.85rem;
        color: #888;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .piece-detail-modal-actions {
        display: flex;
        gap: 10px;
    }

    .piece-detail-modal-actions .btn {
        padding: 8px 20px;
        border-radius: 6px;
        font-size: 0.9rem;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
    }

    .piece-detail-modal-actions .btn-primary {
        background: linear-gradient(135deg, #4a6491, #2c3e50);
        color: #fff;
    }

    .piece-detail-modal-actions .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }

    .piece-detail-modal-actions .btn-secondary {
        background: #e0e0e0;
        color: #333;
    }

    .piece-detail-modal-actions .btn-secondary:hover {
        background: #d0d0d0;
    }

    .fee-type-select {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid #ced4da;
        border-radius: 4px;
        font-size: 0.85rem;
        background: #fff;
        cursor: pointer;
        transition: border-color 0.2s;
    }

    .fee-type-select:focus {
        outline: none;
        border-color: #4a6491;
        box-shadow: 0 0 0 0.2rem rgba(74, 100, 145, 0.15);
    }
</style>

<script>
    if (typeof pieceDetailData === 'undefined') {
        var pieceDetailData = [];
    }

    function openPieceDetailModal() {
        const modal = document.getElementById('pieceDetailModal');
        if (modal) {
            renderPieceDetailTable(pieceDetailData);
            document.getElementById('pieceDetailSearch').value = '';
            modal.style.display = 'block';
        }
    }

    function closePieceDetailModal() {
        const modal = document.getElementById('pieceDetailModal');
        if (modal) {
            modal.style.display = 'none';
        }
    }

    function renderPieceDetailTable(data) {
        const tbody = document.getElementById('pieceDetailTableBody');
        const countEl = document.getElementById('pieceDetailCount');
        if (!tbody) return;

        tbody.innerHTML = '';
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#999;">暂无出库记录</td></tr>';
            if (countEl) countEl.textContent = '共 0 条记录';
            return;
        }

        const feeOptions = generateFeeOptions();

        data.forEach((item, index) => {
            const storageDays = item.storage_days !== null ? item.storage_days : '-';
            const storageMonths = item.storage_months !== null ? item.storage_months : '-';
            
            const tr = document.createElement('tr');
            tr.dataset.index = index;
            tr.innerHTML = `
                <td>${escapeHtml(item.model)}</td>
                <td>${escapeHtml(item.shipping_mark)}</td>
                <td>${item.pcs}</td>
                <td>${storageDays}</td>
                <td>${storageMonths}</td>
                <td>
                    <select class="fee-type-select" data-index="${index}">
                        ${feeOptions}
                    </select>
                </td>
            `;
            tbody.appendChild(tr);
        });

        if (countEl) countEl.textContent = `共 ${data.length} 条记录`;
    }

    function generateFeeOptions() {
        if (!window.warehouseFeeConfig || typeof window.warehouseFeeConfig !== 'object') {
            return '<option value="">无费用配置</option>';
        }
        
        let options = '<option value="">请选择费用类型</option>';
        for (const [feeName, feeData] of Object.entries(window.warehouseFeeConfig)) {
            options += `<option value="${escapeHtml(feeName)}">${escapeHtml(feeName)}</option>`;
        }
        return options;
    }

    function calculateFee(feeConfig, shipmentItem) {
        if (!feeConfig || !feeConfig.formula) return 0;
        
        const formula = feeConfig.formula;
        const rate = parseFloat(feeConfig.rate) || 0;
        const pcs = parseInt(shipmentItem.pcs) || 0;
        const days = parseInt(shipmentItem.storage_days) || 0;
        const months = parseInt(shipmentItem.storage_months) || 1;

        let formulaJs = formula
            .replace(/单价/g, rate)
            .replace(/件数/g, pcs)
            .replace(/天数/g, days)
            .replace(/出库件数/g, pcs)
            .replace(/MAX\(([^)]+)\)/g, (match, p1) => {
                const parts = p1.split(',').map(s => s.trim());
                return `Math.max(${parts.join(', ')})`;
            })
            .replace(/⌈([^⌉]+)⌉/g, (match, p1) => {
                return `Math.ceil(${p1})`;
            })
            .replace(/×/g, '*');

        try {
            return eval(formulaJs);
        } catch (e) {
            console.error('费用计算失败:', formula, e);
            return 0;
        }
    }

    function generateFeeItems() {
        const rows = document.querySelectorAll('#pieceDetailTableBody tr');
        const newFeeItems = [];

        rows.forEach(row => {
            const index = row.dataset.index;
            const select = row.querySelector('.fee-type-select');
            const feeName = select.value;

            if (!feeName) return;

            const shipmentItem = pieceDetailData[index];
            const feeConfig = window.warehouseFeeConfig && window.warehouseFeeConfig[feeName];

            if (!feeConfig) return;

            const amount = calculateFee(feeConfig, shipmentItem);
            const rate = parseFloat(feeConfig.rate) || 0;
            const pcs = parseInt(shipmentItem.pcs) || 0;

            newFeeItems.push({
                description: feeName,
                warehouse: window.warehouseName || '',
                rate: rate,
                quantity: pcs,
                amount: parseFloat(amount.toFixed(2)),
                remark: `件数:${pcs},天数:${shipmentItem.storage_days || 0},公式:${feeConfig.formula}`
            });
        });

        if (newFeeItems.length === 0) {
            alert('请至少选择一项费用类型');
            return;
        }

        if (typeof window.addFeeItemsFromModal === 'function') {
            window.addFeeItemsFromModal(newFeeItems);
        }

        closePieceDetailModal();
    }

    function formatDateTime(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return '-';
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${year}-${month}-${day} ${hours}:${minutes}`;
    }

    function filterPieceDetail() {
        const keyword = (document.getElementById('pieceDetailSearch')?.value || '').toLowerCase();
        const rows = document.querySelectorAll('#pieceDetailTableBody tr');
        let visibleCount = 0;

        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            if (!keyword || text.includes(keyword)) {
                row.classList.remove('hidden-row');
                visibleCount++;
            } else {
                row.classList.add('hidden-row');
            }
        });

        const countEl = document.getElementById('pieceDetailCount');
        if (countEl) {
            countEl.textContent = keyword
                ? `显示 ${visibleCount} / ${pieceDetailData.length} 条`
                : `共 ${pieceDetailData.length} 条记录`;
        }
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // 点击弹框外部区域关闭
    window.addEventListener('click', function(e) {
        const modal = document.getElementById('pieceDetailModal');
        if (e.target === modal) {
            closePieceDetailModal();
        }
    });
</script>
