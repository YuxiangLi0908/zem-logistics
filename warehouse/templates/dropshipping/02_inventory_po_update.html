{% extends 'base.html' %}

{% block content %}
<div id="loading-bar">
    <div class="spinner"></div>
    <p>Loading, please wait...</p>
</div>
<div style="text-align: center; margin-bottom: 15px;">
    <h3>库存管理——PO更新</h3>
</div>
<form method="post" action="" onsubmit="showLoadingBar()">
    {% csrf_token %}
    <input type="hidden" name="step" value="update_po">
    <input type="hidden" name="warehouse" value="{{ warehouse }}">
    <input type="hidden" name="delivery_type" value="{{ delivery_type }}">
    <input type="hidden" name="plt_ids" value="{{ plt_ids }}">
    <input type="hidden" name="container_number" value="{{ dropship_cargo.container }}">
    <input type="hidden" name="is_destroyed" id="is_destroyed" value="False">
    <div style="display: flex; justify-content: space-between; width: 100%;">
        <button type="submit" class="btn btn-success" style="font-size: 11px;">更新PO</button>
        <button type="submit" class="btn btn-danger" style="font-size: 11px;" 
                onclick="setDestroyedAndSubmit(this.form)">销毁PO</button>
    </div>
    <table class="table" id="dropship_cargos-info" style="font-size: 11px; width: 100%;">
        <thead>
            <th class="th">客户</th>
            <th class="th">柜号</th>
            <th class="th">货物名称</th>
            <th class="th">货物型号</th>
            <th class="th">唛头</th>
            <th class="th">地址</th>
            <th class="th">派送方式</th>
            <th class="th">派送类型</th>
            <th class="th">weight(lbs)</th>
            <th class="th">pcs</th>
            <th class="th">cbm</th>
            <th class="th">卡板数</th>
            <th class="th">备注</th>
        </thead>
        <tbody>
            <td class="td">{{ dropship_cargo.customer_name }}</td>
            <td class="td">{{ dropship_cargo.container_number }}</td>
            <td class="td"><input name="product_name" value="{{ dropship_cargo.product_name }}" required></td>
            <td class="td"><input name="model" value="{{ dropship_cargo.model }}" required></td>
            <td class="td"><input name="shipping_mark" value="{{ dropship_cargo.shipping_mark }}" required></td>
            <td class="td"><input name="address" value="{{ dropship_cargo.address }}"></td>
            <td class="td">
                <select name="delivery_method">
                    {% for k, v in delivery_method_options %}
                    <option value="{{ v }}" {%if k == dropship_cargo.delivery_method %}selected{% endif %}>{{ k }}</option>
                    {% endfor %}
                </select>
            </td>
            <td class="td">
                <select name="delivery_type">
                    {% for k, v in delivery_type %}
                    <option value="{{ v }}" {%if v == dropship_cargo.delivery_type %}selected{% endif %}>{{ k }}</option>
                    {% endfor %}
                </select>
            </td>
            <td class="td"><input name="weight" value="{{ dropship_cargo.weight }}"></td>
            <td class="td"><input name="pcs" value="{{ dropship_cargo.pcs }}"></td>
            <td class="td"><input name="cbm" value="{{ dropship_cargo.cbm }}"></td>
            <td class="td"><input name="n_pallet_new" value="{{ dropship_cargo.n_pallet }}"></td>
            <td class="td"><input name="note" value="{{ dropship_cargo.note }}"></td>
        </tbody>
    </table>
</form>

<script>
    function showLoadingBar() {
        document.getElementById('loading-bar').style.display = 'block';
    };
    function setDestroyedAndSubmit(form) {
        document.getElementById('is_destroyed').value = "True";
    }
</script>
{% endblock %}
